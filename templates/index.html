<!doctype html>
<html>
  <head>
    <title>Tic Tac Toe Multiplayer</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
      body {
        text-align: center;
        font-family: Arial;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
      }
      .cell {
        width: 100px;
        height: 100px;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid black;
        cursor: pointer;
      }
      .win {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <h1>🎮 Tic Tac Toe Multiplayer</h1>

    <button onclick="createRoom()">Create Room</button>
    <br /><br />

    <input id="roomInput" placeholder="Enter Room Code" />
    <button onclick="joinRoom()">Join Room</button>

    <h2 id="status"></h2>
    <h3 id="roomCode"></h3>

    <div class="board" id="board"></div>

    <br />
    <button onclick="resetGame()">Reset</button>

    <script>
      let socket = io();
      let room = "";
      let player = "";

      function createRoom() {
        socket.emit("create_room");
      }

      function joinRoom() {
        let code = document.getElementById("roomInput").value;
        socket.emit("join_room", { room: code });
      }

      socket.on("room_created", (data) => {
        room = data.room;
        player = data.symbol;

        document.getElementById("roomCode").innerHTML =
          "Room: " +
          room +
          "<br>Share Link: " +
          window.location.origin +
          "/?room=" +
          room;

        renderBoard(data.game);
      });

      socket.on("joined", (data) => {
        room = data.room;
        player = data.symbol;

        document.getElementById("roomCode").innerHTML = "Room: " + room;
      });

      socket.on("update", (game) => {
        renderBoard(game);
      });

      socket.on("error", (err) => {
        alert(err.msg);
      });

      function renderBoard(game) {
        let boardDiv = document.getElementById("board");
        boardDiv.innerHTML = "";

        document.getElementById("status").innerText = game.status;

        game.board.forEach((cell, i) => {
          let div = document.createElement("div");
          div.className = "cell";
          div.innerText = cell;

          if (game.winning_combo.includes(i)) {
            div.classList.add("win");
          }

          div.onclick = () => {
            socket.emit("move", {
              room: room,
              index: i,
              player: player,
            });
          };

          boardDiv.appendChild(div);
        });
      }

      function resetGame() {
        socket.emit("reset", { room: room });
      }
    </script>
  </body>
</html>

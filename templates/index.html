<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <style>
        body { background: #222; color: white; text-align: center; }
        .board { display:grid; grid-template-columns:repeat(3,100px); gap:10px; justify-content:center; margin-top:20px;}
        .cell { width:100px;height:100px;background:#444;font-size:35px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
        .win { background:green; }
    </style>
</head>

<body>

<h1>🎮 Tic Tac Toe</h1>

<button class="btn btn-success" onclick="createRoom()">Create Room</button>

<div class="mt-3">
    <input id="roomInput" placeholder="Room Code" class="form-control w-25 mx-auto">
    <button class="btn btn-primary mt-2" onclick="joinRoom()">Join</button>
</div>

<h3 id="status"></h3>
<div id="share"></div>
<div class="board" id="board"></div>

<script>
const socket = io();

let room="", mySymbol="", board=[], win=[];

function createRoom(){ socket.emit("create_room"); }

function joinRoom(){
    room=document.getElementById("roomInput").value.toUpperCase();
    socket.emit("join_room",{room});
}

socket.on("room_created", d=>{
    room=d.room; mySymbol=d.symbol;
    showLink(); document.getElementById("status").innerText="You are X";
});

socket.on("joined", d=>{
    room=d.room; mySymbol=d.symbol;
    showLink(); document.getElementById("status").innerText="You are O";
});

socket.on("update", d=>{
    board=d.board; win=d.winning_combo||[];
    document.getElementById("status").innerText=d.status;
    render();
});

function render(){
    let b=document.getElementById("board"); b.innerHTML="";
    board.forEach((v,i)=>{
        let c=document.createElement("div");
        c.className="cell";
        if(win.includes(i)) c.classList.add("win");
        c.innerText=v;
        c.onclick=()=>socket.emit("move",{room,index:i,player:mySymbol});
        b.appendChild(c);
    });
}

function showLink(){
    let link=window.location.origin+"?room="+room;
    document.getElementById("share").innerHTML=`
    <p>Share: <a href="${link}" target="_blank">${link}</a></p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(link)}">
    `;
}

window.onload=()=>{
    let p=new URLSearchParams(window.location.search);
    if(p.get("room")){
        document.getElementById("roomInput").value=p.get("room");
        joinRoom();
    }
}
</script>

</body>
</html>
